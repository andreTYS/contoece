services:
  ollama:
    image: ollama/ollama
    container_name: oece-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal

  oece-server:
    build: ./server
    container_name: oece-ia-server
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - oece_chroma:/app/chroma_db
      - oece_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"
    networks:
      - internal

  oece-web:
    build:
      context: ./app
      dockerfile: Dockerfile.web
    container_name: oece-ia-web
    restart: unless-stopped
    depends_on:
      - oece-server
    volumes:
      - /var/www/certbot:/var/www/certbot:ro
    labels:
      - "traefik.enable=true"
      # HTTPS router — sirve la app Flutter (archivos estáticos)
      - "traefik.http.routers.oece-web.rule=Host(`oece.masredespro.com`)"
      - "traefik.http.routers.oece-web.entrypoints=websecure"
      - "traefik.http.routers.oece-web.tls=true"
      - "traefik.http.services.oece-web.loadbalancer.server.port=80"
      # ServersTransport: Traefik espera hasta 270s por respuesta de nginx (> 240s nginx + margen)
      - "traefik.http.serversTransports.oece-transport.forwardingTimeouts.responseHeaderTimeout=270s"
      - "traefik.http.serversTransports.oece-transport.forwardingTimeouts.dialTimeout=10s"
      - "traefik.http.services.oece-web.loadbalancer.serversTransport=oece-transport"
      # HTTP router — certbot ACME challenge
      - "traefik.http.routers.oece-acme.rule=Host(`oece.masredespro.com`) && PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.oece-acme.entrypoints=web"
      - "traefik.http.routers.oece-acme.service=oece-web"
      - "traefik.http.routers.oece-acme.priority=1000"
      - "traefik.docker.network=n8n_default"
    networks:
      - n8n_default
      - internal

networks:
  n8n_default:
    external: true
  internal:
    driver: bridge

volumes:
  oece_chroma:
  oece_data:
  ollama_data:
