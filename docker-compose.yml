services:
  oece-server:
    build: ./server
    container_name: oece-ia-server
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - oece_chroma:/app/chroma_db
      - oece_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  oece-web:
    build:
      context: ./app
      dockerfile: Dockerfile.web
    container_name: oece-ia-web
    restart: unless-stopped
    depends_on:
      - oece-server
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oece-web.rule=Host(`oece.masredespro.com`)"
      - "traefik.http.routers.oece-web.entrypoints=websecure"
      - "traefik.http.routers.oece-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.oece-web.loadbalancer.server.port=80"
    networks:
      - web
      - internal

networks:
  web:
    external: true
  internal:
    driver: bridge

volumes:
  oece_chroma:
  oece_data:
