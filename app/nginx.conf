server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Flutter web (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Streaming SSE — sin buffer para que los tokens lleguen en tiempo real
    location ~ ^/api/chat/stream {
        resolver 127.0.0.11 valid=10s;
        set $backend oece-server;
        proxy_pass http://$backend:8000/chat/stream$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        add_header X-Accel-Buffering no;
    }

    # Proxy general al servidor Python
    location ~ ^/api/(.*)$ {
        resolver 127.0.0.11 valid=10s;
        set $backend oece-server;
        set $apipath $1;
        proxy_pass http://$backend:8000/$apipath$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_connect_timeout 30s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
