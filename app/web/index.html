<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OECE-IA - Asistente de Contrataciones Públicas del Estado Peruano">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OECE-IA">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>OECE-IA · Asistente de Contrataciones</title>

  <!-- Estilos de carga -->
  <style>
    body {
      margin: 0;
      background-color: #003087;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #loading-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #003087 0%, #0055A5 60%, #001F5E 100%);
      z-index: 9999;
    }
    .loader-logo {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .loader-logo svg {
      width: 48px;
      height: 48px;
      fill: #003087;
    }
    .loader-title {
      color: white;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .loader-subtitle {
      color: #D4A017;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }
    .loader-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="1036373712732-o5h249bo1fdlstjlmjo1ml9smnj76ai2.apps.googleusercontent.com">

  <!-- Firebase SDK (reemplaza con tu configuración) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <!-- Pantalla de carga -->
  <div id="loading-screen">
    <div class="loader-logo">
      <!-- Ícono de banco/institución -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="loader-title">OECE-IA</div>
    <div class="loader-subtitle">Asistente de Contrataciones Públicas</div>
    <div class="loader-spinner"></div>
  </div>

  <script>
    // Oculta la pantalla de carga cuando Flutter está listo
    window.addEventListener('flutter-first-frame', function() {
      const screen = document.getElementById('loading-screen');
      if (screen) {
        screen.style.transition = 'opacity 0.5s ease';
        screen.style.opacity = '0';
        setTimeout(() => screen.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
